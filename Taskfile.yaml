version: "3"
tasks:
  run:
    desc: Run hugo server, including drafts
    cmd: hugo server -D

  build:
    desc: Run hugo server, including drafts
    cmd: hugo --gc --minify --baseURL https://photography.twaslowski.com

  tf:
    desc: Apply infrastructure changes
    dir: terraform
    dotenv:
      - .env
    cmd: terraform apply -var-file=config/prod.tfvars

  sync:
    desc: Sync images to remote storages
    dir: images
    cmd: rclone sync . b2:photos-web-prod --progress

  resize:*:
    desc: Resize images to different outputs for optimized loading
    vars:
      SUBDIR: '{{index .MATCH 0}}'
    cmds:
      - ./scripts/resize-images.sh ./images/{{.SUBDIR}}

  browse:
    desc: Explore images directory; opens Finder on macOS
    dir: images
    cmd: open .