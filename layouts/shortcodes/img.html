{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ $width := .Get "width" | default "90%" }}
{{ partial "lightbox.html" . }}
<div style="text-align: center;">
  <img src="{{ site.Params.imageBaseURL }}{{ $src }}" alt="{{ $alt }}" loading="lazy"
       onclick="openLightbox(this.src)"
       style="width: {{ $width }}; cursor: zoom-in;" />
</div>
