{{ $src := .Get "src" }}
{{ $alt := .Get "alt" | default "" }}
{{ $width := .Get "width" | default "90%" }}
{{ partial "lightbox.html" . }}
<div style="text-align: center;">
  {{ partial "image.html" (dict "src" (printf "%s%s" site.Params.imageBaseURL $src) "alt" $alt "style" (printf "width: %s;" $width)) }}
  <p style="color: var(--text); opacity: 0.7;">{{ $alt }}</p>
</div>
