<div style="margin: 2rem 0; padding: 1.5rem; border: 1px solid var(--dark); border-radius: 8px; background: var(--accent);">
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/twaslowski"
    method="post"
    class="embeddable-buttondown-form"
    style="display: flex; flex-direction: column; gap: 0.75rem;"
  >
    <label for="bd-email" style="font-weight: 600; font-size: 1.1rem; color: var(--text);">Subscribe to get updates for future posts!</label>
    <input type="email" name="email" id="bd-email"
      style="padding: 0.5rem 0.75rem; border: 1px solid var(--dark); border-radius: 4px; font-size: 1rem; background: var(--bg); color: var(--text);" />
    <input type="submit" value="Subscribe"
      style="padding: 0.5rem 1rem; border: none; border-radius: 4px; background: var(--theme); color: #fff; font-size: 1rem; cursor: pointer; align-self: flex-start;" />
  </form>
</div>
